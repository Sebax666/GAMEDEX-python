{% load static %}

<!DOCTYPE html>
<html>

<head>

<title>Factura</title>

<style>

body{
    font-family: Arial;
    background:#f5f5f5;
    padding:40px;
}

.factura{

    background:white;
    padding:30px;
    border-radius:10px;
    max-width:800px;
    margin:auto;
}

h1{
    text-align:center;
}

.tabla{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

.tabla th, .tabla td{
    border:2px solid #000000;
    padding:10px;
    text-align:center;
}

.tabla th{
    background:#202459;
    color:white;
}

.total{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
    text-align:right;
}

.botones{
    margin-top:30px;
    text-align:center;
}

.btn{
    padding:10px 20px;
    background:#28a745;
    color:white;
    text-decoration:none;
    border-radius:6px;
}

</style>

</head>

<body>

<div class="factura">

<h1>Factura de compra</h1>

<p><b>Cliente:</b> {{ usuario.username }}</p>

<table class="tabla">

<tr>
<th>Producto</th>
<th>Precio</th>
<th>Cantidad</th>
<th>Subtotal</th>
</tr>

{% for item in productos %}

<tr>

<td>{{ item.producto.nombre }}</td>
<td>${{ item.producto.precio }}</td>
<td>{{ item.cantidad }}</td>
<td>${{ item.subtotal }}</td>

</tr>

{% endfor %}

</table>

<div class="total">
Total: ${{ total }}
</div>

<div class="botones">

<a href="{% url 'descargar_factura_pdf' %}" class="btn">
Descargar PDF
</a>

</div>

</div>

</body>

</html>
